<mat-card>
  <mat-card-content>
    <div class="full-width-input flex">
      {{ info }}
    </div>
    <div class="full-width-input flex">
      <button type="button" class="form-button confirm" mat-stroked-button (click)="confirm()">确定</button>
      <button type="button" class="form-button cancel" mat-stroked-button (click)="cancel()">取消</button>
    </div>
  </mat-card-content>
</mat-card>
