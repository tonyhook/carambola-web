<ng-container>
  <mat-card class="card-in-container">
    <mat-card-content>
      <mat-tab-group class="tab-in-card">
        <mat-tab label="Properties">
          <form class="form-in-tab" [formGroup]="formGroup">
            <mat-form-field class="full-width-input" subscriptSizing="dynamic">
              <mat-label>Name</mat-label>
              <input placeholder="Name" matInput formControlName="name" />
            </mat-form-field>
            <div class="full-width-input flex">
              @if (authority() === null) {
                <button type="button" class="form-button" mat-stroked-button (click)="addAuthority()">Create</button>
                <button type="button" class="form-button" mat-stroked-button (click)="cancelAuthority()">Cancel</button>
              }
              @if (authority() !== null) {
                <button type="button" class="form-button" mat-stroked-button (click)="updateAuthority()">Modify</button>
                <button type="button" class="form-button" mat-stroked-button (click)="cancelAuthority()">Cancel</button>
                <button type="button" class="form-button delete" mat-stroked-button (click)="removeAuthority()">Delete</button>
              }
            </div>
          </form>
        </mat-tab>
      </mat-tab-group>
    </mat-card-content>
  </mat-card>
</ng-container>
