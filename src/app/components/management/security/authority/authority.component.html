<div class="container">
  <form class="form-in-tab" [formGroup]="formGroupQuery">
    <div class="full-width-input flex">
      <mat-form-field subscriptSizing="dynamic">
        <mat-label>Name</mat-label>
        <input placeholder="Search" matInput formControlName="search" />
        @if (formGroupQuery.controls.search.value.length > 0) {
          <button type="button" matSuffix mat-icon-button (click)="clear($event, 'search', '')">
            <mat-icon>clear</mat-icon>
          </button>
        }
      </mat-form-field>
      <button type="button" class="form-button" mat-stroked-button (click)="query()">Search</button>
      <button type="button" class="form-button new" mat-stroked-button (click)="newAuthority()">New</button>
    </div>
  </form>

  <mat-table matSort [dataSource]="dataSource" [fixedLayout]="true">
    <ng-container matColumnDef="name">
      <mat-header-cell *matHeaderCellDef mat-sort-header>Name</mat-header-cell>
      <mat-cell *matCellDef="let row">
        <div [matBadge]="row.createTime | isNew" matBadgeSize="medium" matBadgeOverlap="false">
          {{ row.name }}
        </div>
      </mat-cell>
    </ng-container>
    <ng-container matColumnDef="actions">
      <mat-header-cell *matHeaderCellDef></mat-header-cell>
      <mat-cell *matCellDef="let row">
        @if (hoverRow === row) {
          <button mat-icon-button (click)="modifyAuthority(row)">
            <mat-icon>settings</mat-icon>
          </button>
        }
      </mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns" (mouseenter)="mouseenter(row)" (mouseleave)="mouseleave()"></mat-row>
  </mat-table>

  <mat-paginator [hidePageSize]="'false'" [pageSize]="50" [pageSizeOptions]="[10, 30, 50]" [showFirstLastButtons]="'true'"></mat-paginator>
</div>
