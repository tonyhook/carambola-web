<mat-toolbar class="expanded-toolbar">
  <div class="expanded-toolbar">
    <button class="header-sm" mat-icon-button (click)="drawerService.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <button class="header-xs" mat-icon-button (click)="drawerService.toggle()">
      <mat-icon>menu</mat-icon>
    </button>
    <button class="header-gt-sm" mat-icon-button routerLink="/admin">
      <mat-icon>home</mat-icon>
    </button>
    <button class="header-gt-sm" mat-button>{{ name }}</button>
    <button class="header-sm" mat-button>{{ name }}</button>
  </div>
  <button class="header-xs" mat-button>{{ name }}</button>
  <div class="header-gt-sm">
    @if (authService.credential() === null) {
      <button mat-button routerLink="/admin/login">
        <mat-icon>power_settings_new</mat-icon>
        ç™»ĺ˝•
      </button>
    } @else {
      @for (extension of headerExtensions; track $index) {
        @if (extension.toolbarComponent) {
          <ng-container *ngComponentOutlet="extension.toolbarComponent" />
        }
      }
      <button mat-button routerLink="/admin/me">
        {{ authService.credential()!.username }}
      </button>
      <button mat-button routerLink="/admin/logout">
        <mat-icon>exit_to_app</mat-icon>
        ćł¨é”€
      </button>
    }
  </div>
  <button class="header-sm" mat-icon-button [mat-menu-trigger-for]="mainMenu">
    <mat-icon>menu</mat-icon>
  </button>
  <button class="header-xs" mat-icon-button [mat-menu-trigger-for]="mainMenu">
    <mat-icon>menu</mat-icon>
  </button>
</mat-toolbar>
<mat-menu x-position="before" #mainMenu="matMenu">
  <button mat-menu-item routerLink="/admin">
    <mat-icon>home</mat-icon>
    é¦–éˇµ
  </button>
  @if (authService.credential() === null) {
    <button mat-menu-item routerLink="/admin/login">
      <mat-icon>power_settings_new</mat-icon>
      ç™»ĺ˝•
    </button>
  } @else {
    @for (extension of headerExtensions; track $index) {
      @if (extension.menuComponent) {
        <ng-container *ngComponentOutlet="extension.menuComponent" />
      }
    }
    <button mat-menu-item routerLink="/admin/me">
      <mat-icon>id_card</mat-icon>
      {{ authService.credential()!.username }}
    </button>
    <button mat-menu-item routerLink="/admin/logout">
      <mat-icon>exit_to_app</mat-icon>
      ćł¨é”€
    </button>
  }
</mat-menu>
